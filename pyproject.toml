[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
  ".git",
  ".venv",
  "frontend/node_modules",
  "frontend/dist",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E203"]

[tool.ruff.lint.per-file-ignores]
# dhcp_config.py contains RouterOS template strings that cannot be split
"app/backend/dhcp_config.py" = ["E501"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["app/backend/tests"]
