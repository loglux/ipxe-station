version: '3.8'

services:
  ipxe-station:
    build: .
    image: ipxe-station:latest
    container_name: ipxe-station
    restart: unless-stopped

    # Use host network mode for full internet access and TFTP/DHCP compatibility
    network_mode: "host"

    # Network capabilities for DHCP validation
    cap_add:
      - NET_ADMIN
      - NET_RAW

    volumes:
      # Persistent storage for all PXE data
      - ./data/srv/tftp:/srv/tftp:rw    # TFTP boot files
      - ./data/srv/http:/srv/http:rw    # HTTP boot files (Ubuntu versions)
      - ./data/srv/ipxe:/srv/ipxe:rw    # iPXE scripts
      - ./data/srv/dhcp:/srv/dhcp:rw    # DHCP configurations
      # Dev mount — covers both backend and frontend (vite builds into app/frontend/dist/)
      # After changing Python code: uvicorn --reload picks it up automatically.
      # After changing frontend: run `npm run build` in frontend/, then refresh browser.
      - ./app:/app:ro

    environment:
      # Application settings
      - PYTHONUNBUFFERED=1
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=9021
      - UVICORN_RELOAD=1    # hot-reload on code changes (remove in prod)

      # PXE settings
      - PXE_SERVER_IP=192.168.10.32
      - HTTP_PORT=9021
      - TFTP_PORT=69

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9021/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    labels:
      - "com.ipxe-station.description=PXE Boot Station with multi-version Ubuntu support"
      - "com.ipxe-station.version=2.0"

# Named volumes for backup/restore operations
volumes:
  ipxe-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
